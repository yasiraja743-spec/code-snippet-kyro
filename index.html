                    "code": "const { createCanvas, GlobalFonts, loadImage } = require('@napi-rs/canvas');\nconst https = require('https');\nconst path = require('path');\nconst fs = require('fs');\nconst axios = require('axios');\n\nconst ROOT_DIR = process.cwd();\nconst OUTPUT_DIR = path.resolve(ROOT_DIR, 'iqc');\nconst ASSETS_DIR = path.join(ROOT_DIR, 'assets');\nconst FONTS_DIR = path.join(ASSETS_DIR, 'fonts');\nconst BG_DIR = path.join(ASSETS_DIR, 'backgrounds');\nconst IMG_DIR = path.join(ASSETS_DIR, 'images');\n\nconst REMOTE_ASSETS = [\n  {\n    url: 'https://raw.githubusercontent.com/Ditzzx-vibecoder/Assets/main/Font/SFPRODISPLAYREGULAR.OTF',\n    dest: path.join(FONTS_DIR, 'SFPRODISPLAYREGULAR.OTF'),\n  },\n  {\n    url: 'https://raw.githubusercontent.com/Ditzzx-vibecoder/Assets/main/Font/SFPRODISPLAYSEMIBOLD.ttf',\n    dest: path.join(FONTS_DIR, 'SFPRODISPLAYSEMIBOLD.ttf'),\n  },\n  {\n    url: 'https://raw.githubusercontent.com/Ditzzx-vibecoder/Assets/main/Image/bg.jpg',\n    dest: path.join(BG_DIR, 'bg.jpg'),\n  },\n  {\n    url: 'https://raw.githubusercontent.com/Ditzzx-vibecoder/Assets/main/Image/artworks-gWLRE6HyPH3DgVMG-ZFFxtg-t500x500.jpg',\n    dest: path.join(IMG_DIR, 'photo.jpg'),\n  },\n];\n\nconst WA_COLORS = [\n  '#E53935', '#D81B60', '#8E24AA', '#5E35B1',\n  '#1E88E5', '#039BE5', '#00897B', '#43A047',\n  '#F4511E', '#FB8C00',\n];\n\nconst COLOR_FILE = path.join(ROOT_DIR, '.color_index');\n\nfunction getNextColor() {\n  let idx = 0;\n  if (fs.existsSync(COLOR_FILE)) idx = parseInt(fs.readFileSync(COLOR_FILE, 'utf8')) || 0;\n  const color = WA_COLORS[idx % WA_COLORS.length];\n  fs.writeFileSync(COLOR_FILE, String((idx + 1) % WA_COLORS.length));\n  return color;\n}\n\nconst config = {\n  canvas: { width: 1920, height: 3413 },\n  safeZones: {\n    namaAtas: {\n      a: 980, b: 1080, c: 250, d: 630,\n      label: 'nama atas', color: 'rgba(255, 80, 80, 0.9)',\n      fontSize: 55, maxChars: 25,\n      font: 'SFProSemiBold', align: 'left',\n    },\n    foto: {\n      a: 1125, b: 1713, c: 240, d: 830,\n      label: 'foto', color: 'rgba(80, 200, 120, 0.9)',\n      radius: 28,\n    },\n    waktu: {\n      a: 1750, b: 1860, c: 233, d: 424,\n      label: 'waktu', color: 'rgba(80, 160, 255, 0.9)',\n      fontSize: 45, maxChars: 10,\n      font: 'SFProRegular', textColor: '#555555', align: 'center',\n    },\n    namaBawah: {\n      a: 2701, b: 2880, c: 700, d: 1160,\n      centerY: 2787,\n      label: 'nama bawah', color: 'rgba(255, 200, 0, 0.9)',\n      fontSize: 67, maxChars: 25,\n      font: 'SFProSemiBold', textColor: '#100e0e', align: 'left',\n    },\n  },\n  debug: false,\n};\n\nfunction download(url, dest) {\n  return new Promise((resolve, reject) => {\n    if (fs.existsSync(dest) && fs.statSync(dest).size > 0) return resolve();\n    fs.mkdirSync(path.dirname(dest), { recursive: true });\n    const file = fs.createWriteStream(dest);\n    https.get(url, res => {\n      if ([301, 302, 303, 307, 308].includes(res.statusCode)) {\n        file.close(() => {\n          if (fs.existsSync(dest)) fs.unlinkSync(dest);\n          download(res.headers.location, dest).then(resolve).catch(reject);\n        });\n        return;\n      }\n      if (res.statusCode !== 200) {\n        file.close(() => {\n          if (fs.existsSync(dest)) fs.unlinkSync(dest);\n          reject(new Error(`HTTP ${res.statusCode} untuk ${url}`));\n        });\n        return;\n      }\n      res.pipe(file);\n      file.on('finish', () => {\n        file.close(() => {\n          if (!fs.existsSync(dest) || fs.statSync(dest).size <= 0) reject(new Error(`Asset gagal disimpan: ${dest}`));\n          else resolve();\n        });\n      });\n    }).on('error', err => {\n      file.close(() => {\n        if (fs.existsSync(dest)) fs.unlinkSync(dest);\n        reject(err);\n      });\n    });\n  });\n}\n\nasync function downloadAll() {\n  for (const asset of REMOTE_ASSETS) await download(asset.url, asset.dest);\n}\n\nfunction findFontFile(dir, basenames) {\n  if (!fs.existsSync(dir)) return null;\n  const files = fs.readdirSync(dir);\n  for (const base of basenames) {\n    const match = files.find(f => f.toLowerCase() === base.toLowerCase());\n    if (match) return path.join(dir, match);\n  }\n  return null;\n}\n\nfunction registerFont(family, ...basenames) {\n  const file = findFontFile(FONTS_DIR, basenames);\n  if (!file) throw new Error(`Font tidak ditemukan: ${family}`);\n  GlobalFonts.registerFromPath(file, family);\n  const ok = GlobalFonts.families.some(f => f.family === family);\n  if (!ok) throw new Error(`Gagal register font: ${family}`);\n}\n\nlet fontsLoaded = false;\nfunction loadFonts() {\n  if (fontsLoaded) return;\n  registerFont('SFProSemiBold', 'SFPRODISPLAYSEMIBOLD.TTF', 'SFPRODISPLAYSEMIBOLD.OTF');\n  registerFont('SFProRegular', 'SFPRODISPLAYREGULAR.OTF', 'SFPRODISPLAYREGULAR.TTF');\n  fontsLoaded = true;\n}\n\nfunction roundedClipPath(ctx, x, y, w, h, r) {\n  ctx.beginPath();\n  ctx.moveTo(x + r, y);\n  ctx.lineTo(x + w - r, y);\n  ctx.quadraticCurveTo(x + w, y, x + w, y + r);\n  ctx.lineTo(x + w, y + h - r);\n  ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);\n  ctx.lineTo(x + r, y + h);\n  ctx.quadraticCurveTo(x, y + h, x, y + h - r);\n  ctx.lineTo(x, y + r);\n  ctx.quadraticCurveTo(x, y, x + r, y);\n  ctx.closePath();\n}\n\nfunction drawText(ctx, text, zone, textColor) {\n  const { a, b, c, d, fontSize, maxChars, font, align, fontWeight, centerY } = zone;\n  const str = String(text).slice(0, maxChars);\n  const boxW = d - c;\n  const boxH = b - a;\n  const cy = centerY !== undefined ? centerY : a + boxH / 2;\n  const weight = fontWeight || (font === 'SFProSemiBold' ? 'bold' : 'normal');\n  let size = fontSize;\n  ctx.textBaseline = 'middle';\n  while (size > 12) {\n    ctx.font = `${weight} ${size}px ${font}`;\n    if (ctx.measureText(str).width <= boxW) break;\n    size -= 1;\n  }\n  ctx.font = `${weight} ${size}px ${font}`;\n  ctx.fillStyle = textColor;\n  ctx.shadowColor = 'transparent';\n  if (align === 'center') {\n    ctx.textAlign = 'center';\n    ctx.fillText(str, c + boxW / 2, cy);\n  } else {\n    ctx.textAlign = 'left';\n    ctx.fillText(str, c, cy);\n  }\n}\n\nasync function drawFoto(ctx, imageBuffer, zone) {\n  const { a, b, c, d, radius } = zone;\n  const x = c, y = a, w = d - c, h = b - a, r = radius || 28;\n  const img = await loadImage(imageBuffer);\n  const imgRatio = img.width / img.height;\n  const boxRatio = w / h;\n  ctx.save();\n  roundedClipPath(ctx, x, y, w, h, r);\n  ctx.clip();\n  ctx.filter = 'blur(28px)';\n  ctx.drawImage(img, x - 40, y - 40, w + 80, h + 80);\n  ctx.filter = 'none';\n  let fw, fh;\n  if (imgRatio > boxRatio) { fw = w; fh = fw / imgRatio; }\n  else { fh = h; fw = fh * imgRatio; }\n  ctx.drawImage(img, x + (w - fw) / 2, y + (h - fh) / 2, fw, fh);\n  ctx.restore();\n}\n\nasync function generateIqcImage(nama, waktu, imageBuffer) {\n  loadFonts();\n  const namaColor = getNextColor();\n  const { width, height } = config.canvas;\n  const canvas = createCanvas(width, height);\n  const ctx = canvas.getContext('2d');\n\n  const bgPath = path.join(BG_DIR, 'bg.jpg');\n  if (fs.existsSync(bgPath) && fs.statSync(bgPath).size > 0) {\n    const bgImg = await loadImage(bgPath);\n    ctx.drawImage(bgImg, 0, 0, width, height);\n  } else {\n    ctx.fillStyle = '#f0ece4';\n    ctx.fillRect(0, 0, width, height);\n  }\n\n  if (imageBuffer) {\n    await drawFoto(ctx, imageBuffer, config.safeZones.foto);\n  }\n\n  drawText(ctx, nama, config.safeZones.namaAtas, namaColor);\n  drawText(ctx, waktu, config.safeZones.waktu, config.safeZones.waktu.textColor);\n  drawText(ctx, nama, config.safeZones.namaBawah, config.safeZones.namaBawah.textColor);\n  return canvas.toBuffer('image/png');\n}\n\nasync function getImageBufferFromMessage(bot, replyMsg) {\n  if (!replyMsg) return null;\n  if (replyMsg.sticker) {\n    const fileId = replyMsg.sticker.file_id;\n    const file = await bot.getFile(fileId);\n    const url = `https://api.telegram.org/file/bot${bot.token}/${file.file_path}`;\n    const response = await axios.get(url, { responseType: 'arraybuffer' });\n    return Buffer.from(response.data);\n  }\n  if (replyMsg.photo) {\n    const photo = replyMsg.photo[replyMsg.photo.length - 1];\n    const fileId = photo.file_id;\n    const file = await bot.getFile(fileId);\n    const url = `https://api.telegram.org/file/bot${bot.token}/${file.file_path}`;\n    const response = await axios.get(url, { responseType: 'arraybuffer' });\n    return Buffer.from(response.data);\n  }\n  return null;\n}\n\nlet assetsDownloaded = false;\nasync function ensureAssets() {\n  if (!assetsDownloaded) {\n    await downloadAll();\n    assetsDownloaded = true;\n  }\n}\n\nasync function handleIqcv2(bot, msg) {\n  const chatId = msg.chat.id;\n  let nama = '';\n  let imageBuffer = null;\n\n  // Cek apakah reply stiker/foto\n  if (msg.reply_to_message) {\n    const replied = msg.reply_to_message;\n    // Ambil gambar dari reply (stiker/foto)\n    try {\n      imageBuffer = await getImageBufferFromMessage(bot, replied);\n    } catch (err) {\n      console.error('Gagal ambil gambar dari reply:', err.message);\n    }\n    // Ambil nama dari reply (jika ada)\n    if (replied.from) {\n      nama = replied.from.username ? `@${replied.from.username}` : replied.from.first_name;\n    }\n  }\n\n  // Ambil teks setelah command (jika ada) untuk custom nama\n  const args = msg.text.split(/\\s+/);\n  args.shift(); // hapus command\n  const inputText = args.join(' ').trim();\n  if (inputText) {\n    nama = inputText;\n  }\n\n  // Jika nama masih kosong, pakai nama pengirim\n  if (!nama) {\n    nama = msg.from.username ? `@${msg.from.username}` : msg.from.first_name;\n  }\n  if (!nama) nama = 'User';\n\n  // Waktu WIB\n  const now = new Date();\n  const wibOffset = 7 * 60 * 60 * 1000;\n  const wibTime = new Date(now.getTime() + wibOffset);\n  const hours = wibTime.getUTCHours().toString().padStart(2, '0');\n  const minutes = wibTime.getUTCMinutes().toString().padStart(2, '0');\n  const waktu = `${hours}.${minutes}`;\n\n  const statusMsg = await bot.sendMessage(chatId, '⏳ Membuat kartu iqc...', { parse_mode: 'Markdown' });\n\n  try {\n    await ensureAssets();\n    // Jika tidak ada gambar dari reply, gunakan foto default\n    let finalImageBuffer = imageBuffer;\n    if (!finalImageBuffer) {\n      const defaultPhotoPath = path.join(IMG_DIR, 'photo.jpg');\n      if (fs.existsSync(defaultPhotoPath) && fs.statSync(defaultPhotoPath).size > 0) {\n        finalImageBuffer = fs.readFileSync(defaultPhotoPath);\n      } else {\n        throw new Error('Foto default tidak tersedia');\n      }\n    }\n    const buffer = await generateIqcImage(nama, waktu, finalImageBuffer);\n    const tempPath = path.join(OUTPUT_DIR, `iqc_${Date.now()}.png`);\n    fs.mkdirSync(OUTPUT_DIR, { recursive: true });\n    fs.writeFileSync(tempPath, buffer);\n    await bot.sendPhoto(chatId, tempPath, { caption: `🪪 *IQC Card*\\n👤 Nama: ${nama}\\n⏰ Waktu: ${waktu} WIB`, parse_mode: 'Markdown' });\n    await bot.deleteMessage(chatId, statusMsg.message_id).catch(() => {});\n    fs.unlink(tempPath, () => {});\n  } catch (err) {\n    console.error(err);\n    await bot.editMessageText(`❌ Gagal membuat iqc: ${err.message}`, { chat_id: chatId, message_id: statusMsg.message_id, parse_mode: 'Markdown' });\n  }\n}\n\nmodule.exports = { handleIqcv2 };",
                    "filename": "iqcv2Handler.js"
          },

                    "code": "const axios = require('axios');\nconst limitManager = require('./limitManager');\n\nasync function handleAIImage(bot, msg, config) {\n    const chatId = msg.chat.id;\n    const text = msg.text;\n    const prompt = text.substring(9).trim();\n\n    if (!prompt) {\n        return bot.sendMessage(chatId,\n            `🎨 *AI IMAGE GENERATOR*\\n\\n` +\n            `Cara pakai: /aiimage [deskripsi gambar]\\n\\n` +\n            `Contoh:\\n` +\n            `/aiimage kucing pakai baju batik\\n` +\n            `/aiimage pemandangan pantai sunset\\n\\n` +\n            `_Hasil AI generasi terbaru!_`,\n            { parse_mode: 'Markdown' }\n        );\n    }\n\n    let statusMsg = null;\n\n    try {\n        statusMsg = await bot.sendMessage(chatId, \"🎨 *Sedang generate gambar...*\\n\\n⏳ Ini butuh beberapa detik.\", { parse_mode: 'Markdown' });\n\n        const res = await axios.get(\n            `http://api.ikyyxd.my.id/ai/text2img`,\n            {\n                params: {\n                    apikey: \"kyzz\",\n                    text: prompt\n                },\n                timeout: 60000\n            }\n        );\n\n        if (!res.data || !res.data.status || !res.data.result || !res.data.result.url) {\n            throw new Error('Gagal generate gambar');\n        }\n\n        const imageUrl = res.data.result.url;\n        const caption = `\n🖼️ *AI IMAGE GENERATOR*\n\n📌 *Prompt:* ${prompt}\n\n⚡ Powered by Kyro (Sora AI)\n`;\n\n        if (statusMsg) {\n            await bot.deleteMessage(chatId, statusMsg.message_id).catch(() => {});\n        }\n\n        await bot.sendPhoto(chatId, imageUrl, {\n            caption: caption,\n            parse_mode: 'Markdown'\n        });\n\n    } catch (error) {\n        console.error('AI Image Error:', error.message);\n\n        if (statusMsg) {\n            await bot.deleteMessage(chatId, statusMsg.message_id).catch(() => {});\n        }\n\n        let errorMsg = error.message;\n        if (error.response?.status === 403) {\n            errorMsg = 'API key tidak valid atau server sedang sibuk';\n        } else if (error.code === 'ECONNABORTED') {\n            errorMsg = 'Timeout, server terlalu lambat. Coba lagi nanti.';\n        }\n\n        await bot.sendMessage(chatId,\n            `❌ *Gagal generate gambar*\\n\\n` +\n            `Prompt: ${prompt}\\n` +\n            `Error: ${errorMsg}\\n\\n` +\n            `Coba prompt lain atau tunggu beberapa saat.`,\n            { parse_mode: 'Markdown' }\n        );\n    }\n}\n\nmodule.exports = { handleAIImage };",

                    "type": "js",
                    "code": "const axios = require('axios');\nconst limitManager = require('./limitManager');\n\nlet conversationHistory = new Map();\n\nasync function handleAI(bot, msg, config) {\n    const chatId = msg.chat.id;\n    const text = msg.text;\n    let prompt = text.substring(3).trim();\n    let isReply = false;\n\n    if (msg.reply_to_message) {\n        isReply = true;\n        if (!prompt) {\n            return bot.sendMessage(chatId, \n                `💬 *LANJUTKAN PERCAKAPAN*\\nReply ke pesan AI sebelumnya lalu kirim pertanyaan.`,\n                { parse_mode: 'Markdown' }\n            );\n        }\n    }\n\n    if (!prompt) {\n        return bot.sendMessage(chatId, \n            `🤖 *AI CHAT*\\n/ai [pertanyaan]\\nContoh: /ai apa itu nodejs?\\n\\n💡 *Tips:* Reply ke pesan AI untuk melanjutkan obrolan!`,\n            { parse_mode: 'Markdown' }\n        );\n    }\n\n    let statusMsg = null;\n\n    try {\n        statusMsg = await bot.sendMessage(chatId, \"🤖 *AI sedang memproses...*\", { parse_mode: 'Markdown' });\n\n        let history = conversationHistory.get(chatId) || [];\n        if (!isReply) {\n            history = [];\n        }\n\n        let context = '';\n        if (history.length > 0) {\n            const lastMessages = history.slice(-10);\n            for (const m of lastMessages) {\n                context += `${m.role === 'user' ? 'User' : 'Assistant'}: ${m.content}\\n`;\n            }\n        }\n        \n        const finalPrompt = context ? `${context}\\nUser: ${prompt}\\nAssistant:` : prompt;\n\n        const apiUrl = `https://api.nexray.eu.cc/ai/claude?text=${encodeURIComponent(finalPrompt)}`;\n        const response = await axios.get(apiUrl, { timeout: 60000 });\n\n        let result = null;\n        if (response.data && typeof response.data === 'object') {\n            result = response.data.result || response.data.response || response.data.message;\n        } else if (typeof response.data === 'string') {\n            result = response.data;\n        }\n\n        if (!result) throw new Error('Tidak ada respons dari AI');\n\n        history.push({ role: \"user\", content: prompt });\n        history.push({ role: \"assistant\", content: result });\n        if (history.length > 20) history = history.slice(-20);\n        conversationHistory.set(chatId, history);\n\n        setTimeout(() => {\n            if (conversationHistory.get(chatId) === history) conversationHistory.delete(chatId);\n        }, 30 * 60 * 1000);\n\n        if (statusMsg) await bot.deleteMessage(chatId, statusMsg.message_id).catch(() => {});\n        if (result.length > 4096) {\n            for (let i = 0; i < result.length; i += 4096) {\n                await bot.sendMessage(chatId, result.substring(i, i + 4096));\n            }\n        } else {\n            await bot.sendMessage(chatId, result);\n        }\n\n    } catch (error) {\n        console.error('AI Error:', error.message);\n        if (statusMsg) await bot.deleteMessage(chatId, statusMsg.message_id).catch(() => {});\n        await bot.sendMessage(chatId, \n            `❌ *Gagal mendapatkan respons*\\n\\nError: ${error.message}\\n\\nCoba lagi nanti.`,\n            { parse_mode: 'Markdown' }\n        );\n    }\n}\n\nmodule.exports = { handleAI };",
                    "filename": "aiHandler.js"
          },

                    "code": "const axios = require(\"axios\");\nconst FormData = require(\"form-data\");\nconst fs = require(\"fs\");\nconst path = require(\"path\");\nconst limitManager = require('./limitManager');\n\nclass Text2Video {\n    constructor() {\n        this.baseURL = \"https://www.freeaivideos.org\";\n        this.headers = {\n            \"user-agent\": \"NB Android/1.0.0\",\n            \"origin\": \"https://www.freeaivideos.org\",\n            \"referer\": \"https://www.freeaivideos.org/\"\n        };\n    }\n\n    async loadImage(image) {\n        if (!image) return null;\n        if (/^https?:\\/\\//.test(image)) {\n            const { data } = await axios.get(image, { responseType: \"arraybuffer\" });\n            return Buffer.from(data);\n        }\n        if (Buffer.isBuffer(image)) return image;\n        return fs.readFileSync(image);\n    }\n\n    async create(prompt, image = null) {\n        const buffer = await this.loadImage(image);\n        const form = new FormData();\n        form.append(\"prompt\", prompt || \"\");\n        if (buffer) {\n            form.append(\"initialFrame\", buffer, { filename: \"image.jpg\", contentType: \"image/jpeg\" });\n        }\n        const { data } = await axios.post(`${this.baseURL}/api/video_generation`, form, {\n            headers: { ...this.headers, ...form.getHeaders() },\n            timeout: 60000\n        });\n        return data;\n    }\n\n    async polling(requestId, maxRetry = 200, delay = 3000) {\n        for (let i = 0; i < maxRetry; i++) {\n            await new Promise(r => setTimeout(r, delay));\n            try {\n                const { data } = await axios.get(`${this.baseURL}/api/video_generation?request_id=${requestId}&prompt=`, {\n                    headers: this.headers\n                });\n                if (data?.video_url) return data;\n            } catch (e) {}\n        }\n        return null;\n    }\n\n    async generate(prompt, image = null) {\n        try {\n            const create = await this.create(prompt, image);\n            const requestId = create?.request_id;\n            if (!requestId) return { status: false, message: \"Failed get request_id\" };\n            const result = await this.polling(requestId);\n            if (!result) return { status: false, message: \"Timeout video generate\" };\n            return {\n                status: true,\n                result: {\n                    task_id: requestId,\n                    prompt,\n                    video_mp4: result.video_url\n                }\n            };\n        } catch (e) {\n            return { status: false, message: e?.response?.data || e.message };\n        }\n    }\n}\n\nasync function handleTeks2Video(bot, msg, config) {\n    const chatId = msg.chat.id;\n    let prompt = \"\";\n    let imageBuffer = null;\n\n    if (msg.reply_to_message && msg.reply_to_message.photo) {\n        const photo = msg.reply_to_message.photo[msg.reply_to_message.photo.length - 1];\n        const file = await bot.getFile(photo.file_id);\n        const fileUrl = `https://api.telegram.org/file/bot${bot.token}/${file.file_path}`;\n        const response = await axios.get(fileUrl, { responseType: \"arraybuffer\" });\n        imageBuffer = Buffer.from(response.data);\n        const text = msg.text || \"\";\n        const parts = text.split(/\\s+/);\n        parts.shift();\n        prompt = parts.join(\" \");\n    } else {\n        const text = msg.text || \"\";\n        const parts = text.split(/\\s+/);\n        parts.shift();\n        prompt = parts.join(\" \");\n    }\n\n    if (!prompt.trim()) {\n        return bot.sendMessage(chatId, \"❌ *Format salah!*\\n\\nGunakan: `/teks2video [prompt]`\\nAtau reply ke gambar dengan caption `/teks2video [prompt]`\", { parse_mode: \"Markdown\" });\n    }\n\n    const statusMsg = await bot.sendMessage(chatId, \"🎬 *Sedang membuat video...*\\n⏳ Proses ini bisa memakan waktu hingga 2 menit.\", { parse_mode: \"Markdown\" });\n\n    try {\n        const ai = new Text2Video();\n        const result = await ai.generate(prompt, imageBuffer);\n        if (!result.status) throw new Error(result.message);\n\n        const videoUrl = result.result.video_mp4;\n        const videoRes = await axios.get(videoUrl, { responseType: \"stream\" });\n        const tempPath = path.join(__dirname, `temp_video_${Date.now()}.mp4`);\n        const writer = fs.createWriteStream(tempPath);\n        videoRes.data.pipe(writer);\n        await new Promise((resolve, reject) => {\n            writer.on(\"finish\", resolve);\n            writer.on(\"error\", reject);\n        });\n\n        await bot.sendVideo(chatId, tempPath, {\n            caption: `🎥 *Video berhasil dibuat!*\\n📝 *Prompt:* ${prompt.substring(0, 200)}`,\n            parse_mode: \"Markdown\"\n        });\n\n        await bot.deleteMessage(chatId, statusMsg.message_id).catch(() => {});\n        fs.unlink(tempPath, () => {});\n    } catch (err) {\n        console.error(err);\n        await bot.editMessageText(`❌ *Gagal membuat video:*\\n${err.message}`, {\n            chat_id: chatId,\n            message_id: statusMsg.message_id,\n            parse_mode: \"Markdown\"\n        });\n    }\n}\n\nmodule.exports = { handleTeks2Video };",
                    "filename": "aivideoHandler.js"
          },

                    "code": "const axios = require('axios');\nconst limitManager = require('./limitManager');\n\nasync function handleAnimeSearch(bot, msg, config) {\n    const chatId = msg.chat.id;\n    const text = msg.text;\n    const query = text.substring(7).trim();\n\n    if (!query) {\n        return bot.sendMessage(chatId,\n            `🔍 *ANIME SEARCH*\\n\\nCara pakai: /nanime [judul anime]\\nContoh: /nanime naruto\\n\\nMencari informasi anime dari MyAnimeList.`,\n            { parse_mode: 'Markdown' }\n        );\n    }\n\n    let statusMsg = null;\n\n    try {\n        statusMsg = await bot.sendMessage(chatId, `🔎 Mencari \"${query}\"...`, { parse_mode: 'Markdown' });\n\n        const apiUrl = `https://api.jikan.moe/v4/anime?q=${encodeURIComponent(query)}&limit=5`;\n        const response = await axios.get(apiUrl, { timeout: 10000 });\n\n        if (!response.data || !response.data.data || response.data.data.length === 0) {\n            throw new Error('Tidak ditemukan');\n        }\n\n        let reply = `<b>🔍 ${response.data.data.length} hasil untuk \"${query}\"</b>\\n\\n`;\n        for (let i = 0; i < response.data.data.length; i++) {\n            const anime = response.data.data[i];\n            reply += `<b>${i+1}. ${escapeHtml(anime.title)}</b>\\n`;\n            if (anime.title_english) reply += `   🇬🇧 English: ${escapeHtml(anime.title_english)}\\n`;\n            reply += `   ⭐ Rating: ${anime.score || 'N/A'} | 📺 Episode: ${anime.episodes || 'N/A'} | 📅 Tahun: ${anime.year || 'N/A'}\\n`;\n            reply += `   🔗 MyAnimeList: <a href=\"${anime.url}\">${anime.url}</a>\\n\\n`;\n        }\n\n        if (statusMsg) await bot.deleteMessage(chatId, statusMsg.message_id).catch(() => {});\n        await bot.sendMessage(chatId, reply, { parse_mode: 'HTML' });\n\n    } catch (error) {\n        console.error('Anime search error:', error.message);\n        if (statusMsg) await bot.deleteMessage(chatId, statusMsg.message_id).catch(() => {});\n        await bot.sendMessage(chatId, `❌ Gagal mencari\\n\\nError: ${error.message}`, { parse_mode: 'Markdown' });\n    }\n}\n\nfunction escapeHtml(text) {\n    if (!text) return '';\n    return text.replace(/[&<>]/g, function(m) {\n        if (m === '&') return '&amp;';\n        if (m === '<') return '&lt;';\n        if (m === '>') return '&gt;';\n        return m;\n    }).replace(/[\\uD800-\\uDBFF][\\uDC00-\\uDFFF]/g, function(c) {\n        return c;\n    });\n}\n\nmodule.exports = { handleAnimeSearch };",

                    "code": "const axios = require('axios');\nconst fs = require('fs');\nconst path = require('path');\n\nasync function handleHdVideo(bot, msg) {\n    const chatId = msg.chat.id;\n    const reply = msg.reply_to_message;\n    if (!reply || !reply.video) {\n        return bot.sendMessage(chatId, '❌ Reply ke video yang mau di-HD-kan!');\n    }\n    let statusMsg = null;\n    let tempPath = null;\n    try {\n        const videoFile = await bot.getFile(reply.video.file_id);\n        const videoUrl = `https://api.telegram.org/file/bot${bot.token}/${videoFile.file_path}`;\n        statusMsg = await bot.sendMessage(chatId, '⏳ Memproses video (HD)...\\n⏱️ Estimasi: 20-30 detik');\n        \n        const apiUrl = `https://api.nexray.eu.cc/tools/v1/hdvideo?url=${encodeURIComponent(videoUrl)}&resolusi=4k`;\n        const response = await axios.get(apiUrl, { \n            timeout: 60000,\n            headers: { 'User-Agent': 'Mozilla/5.0' }\n        });\n        if (!response.data?.status || !response.data?.result) {\n            throw new Error('Gagal memproses video');\n        }\n        const downloadUrl = response.data.result;\n        \n        await bot.editMessageText('📥 Mengunduh video HD...', {\n            chat_id: chatId,\n            message_id: statusMsg.message_id\n        });\n        const videoRes = await axios.get(downloadUrl, {\n            responseType: 'stream',\n            timeout: 120000,\n            maxRedirects: 5,\n            headers: { 'User-Agent': 'Mozilla/5.0' }\n        });\n        tempPath = path.join(__dirname, `hdvid_${Date.now()}.mp4`);\n        const writer = fs.createWriteStream(tempPath);\n        videoRes.data.pipe(writer);\n        await new Promise((resolve, reject) => {\n            writer.on('finish', resolve);\n            writer.on('error', reject);\n        });\n        await bot.deleteMessage(chatId, statusMsg.message_id).catch(() => {});\n        await bot.sendVideo(chatId, tempPath, {\n            caption: '✅ Video HD berhasil!',\n            reply_to_message_id: msg.message_id\n        });\n    } catch (error) {\n        console.error('HD Video error:', error.message);\n        let errorMsg = error.message;\n        if (error.response?.status === 403) {\n            errorMsg = 'API sedang membatasi akses. Coba lagi nanti.';\n        }\n        if (statusMsg) {\n            await bot.editMessageText(`❌ Gagal: ${errorMsg}`, {\n                chat_id: chatId,\n                message_id: statusMsg.message_id\n            }).catch(() => {});\n        }\n    } finally {\n        if (tempPath && fs.existsSync(tempPath)) {\n            try { fs.unlinkSync(tempPath); } catch (err) {}\n        }\n    }\n}\n\nmodule.exports = { handleHdVideo };",

                    "code": "const cron = require('node-cron');\n\nconst axios = require('axios');\n\nconst moment = require('moment');\n\n// JADWAL SHOLAT JAKARTA (UPDATE MANUAL - SESUAI PERMINTAAN)\n\nconst jadwalManual = {\n\n    subuh: \"04:57\",\n\n    dzuhur: \"12:20\", \n\n    ashar: \"15:39\",\n\n    maghrib: \"18:25\",\n\n    isya: \"19:32\"\n\n};\n\n// JADWAL SHOLAT (AKAN DIGUNAKAN OLEH BOT)\n\nlet jadwalSholat = [\n\n    { waktu: jadwalManual.subuh, nama: 'SUBUH', ...jadwalManual },\n\n    { waktu: jadwalManual.dzuhur, nama: 'DZUHUR', ...jadwalManual },\n\n    { waktu: jadwalManual.ashar, nama: 'ASHAR', ...jadwalManual },\n\n    { waktu: jadwalManual.maghrib, nama: 'MAGHRIB', ...jadwalManual },\n\n    { waktu: jadwalManual.isya, nama: 'ISYA', ...jadwalManual }\n\n];\n\n// HADIS-HADIS PANJANG TENTANG SHOLAT\n\nconst hadisCollection = [\n\n    {\n\n        arab: \"عَنْ أَبِي هُرَيْرَةَ رَضِيَ اللَّهُ عَنْهُ أَنَّ رَسُولَ اللَّهِ صَلَّى اللَّهُ عَلَيْهِ وَسَلَّمَ قَالَ: أَوَّلُ مَا يُحَاسَبُ بِهِ الْعَبْدُ يَوْمَ الْقِيَامَةِ الصَّلَاةُ، فَإِنْ صَلُحَتْ صَلُحَ سَائِرُ عَمَلِهِ، وَإِنْ فَسَدَتْ فَسَدَ سَائِرُ عَمَلِهِ\",\n\n        arti: \"Dari Abu Hurairah RA, Rasulullah SAW bersabda: 'Amalan yang pertama kali dihisab pada seorang hamba di hari kiamat adalah shalat. Jika shalatnya baik, maka baik pula seluruh amalnya. Jika shalatnya rusak, maka rusak pula seluruh amalnya.'\",\n\n        sumber: \"(HR. Thabrani)\"\n\n    },\n\n    {\n\n        arab: \"إِنَّ الصَّلَاةَ كَانَتْ عَلَى الْمُؤْمِنِينَ كِتَابًا مَّوْقُوتًا\",\n\n        arti: \"Sesungguhnya shalat itu adalah kewajiban yang ditentukan waktunya atas orang-orang yang beriman.\",\n\n        sumber: \"(QS. An-Nisa: 103)\"\n\n    },\n\n    {\n\n        arab: \"بَيْنَ الرَّجُلِ وَبَيْنَ الشِّرْكِ وَالْكُفْرِ تَرْكُ الصَّلَاةِ\",\n\n        arti: \"Pembatas antara seorang Muslim dengan kesyirikan dan kekafiran adalah meninggalkan shalat.\",\n\n        sumber: \"(HR. Muslim)\"\n\n    },\n\n    {\n\n        arab: \"الصَّلَاةُ نُورٌ، وَالصَّدَقَةُ بُرْهَانٌ، وَالصَّبْرُ ضِيَاءٌ\",\n\n        arti: \"Shalat itu cahaya, sedekah itu bukti, dan sabar itu sinar.\",\n\n        sumber: \"(HR. Muslim)\"\n\n    },\n\n    {\n\n        arab: \"مَنْ حَافَظَ عَلَيْهَا كَانَتْ لَهُ نُورًا وَبُرْهَانًا وَنَجَاةً يَوْمَ الْقِيَامَةِ\",\n\n        arti: \"Barangsiapa menjaga shalatnya, maka ia akan menjadi cahaya, bukti, dan penyelamat baginya di hari kiamat.\",\n\n        sumber: \"(HR. Ahmad)\"\n\n    },\n\n    {\n\n        arab: \"الْعَهْدُ الَّذِي بَيْنَنَا وَبَيْنَهُمُ الصَّلَاةُ، فَمَنْ تَرَكَهَا فَقَدْ كَفَرَ\",\n\n        arti: \"Perjanjian antara kami dan mereka adalah shalat. Barangsiapa meninggalkannya, maka ia telah kafir.\",\n\n        sumber: \"(HR. Ahmad dan Ashhabus Sunan)\"\n\n    },\n\n    {\n\n        arab: \"رَأْسُ الْأَمْرِ الْإِسْلَامُ، وَعَمُودُهُ الصَّلَاةُ، وَذِرْوَةُ سَنَامِهِ الْجِهَادُ\",\n\n        arti: \"Pokok segala urusan adalah Islam, tiangnya adalah shalat, dan puncaknya adalah jihad.\",\n\n        sumber: \"(HR. Tirmidzi)\"\n\n    }\n\n];\n\n// UCAPAN SELAMAT YANG MEWAH\n\nconst ucapanSholat = {\n\n    subuh: [\n\n        \"🌅 *Selamat menunaikan Shalat Subuh* 🌅\\nSemoga keberkahan pagi ini menyertai langkah kita. Subuh adalah awal yang indah untuk memulai hari dengan mengingat Allah.\",\n\n        \"☀️ *Shalat Subuh telah tiba* ☀️\\nBangunlah, raih keberkahan pagi. Subuh lebih baik dari dunia dan seisinya.\",\n\n        \"✨ *Waktu Subuh yang berkah* ✨\\nJangan lewatkan keutamaan shalat Subuh berjamaah.\"\n\n    ],\n\n    dzuhur: [\n\n        \"☀️ *Selamat menunaikan Shalat Dzuhur* ☀️\\nIstirahatkan jiwa sejenak, tinggalkan urusan dunia, dan kembali kepada Allah.\",\n\n        \"🕌 *Dzuhur telah tiba* 🕌\\nDi tengah hiruk pikuk dunia, jangan lupa untuk bersujud.\",\n\n        \"🌤️ *Waktu Dzuhur yang mulia* 🌤️\\nSemoga shalat Dzuhur kita diterima Allah.\"\n\n    ],\n\n    ashar: [\n\n        \"🌆 *Selamat menunaikan Shalat Ashar* 🌆\\nMenjelang sore, jangan biarkan waktu berlalu tanpa mengingat Allah.\",\n\n        \"🌇 *Ashar telah tiba* 🌇\\nMasih ada waktu untuk memperbaiki diri.\",\n\n        \"⏳ *Waktu Ashar yang berharga* ⏳\\nJangan sampai kita termasuk orang yang merugi di waktu Ashar.\"\n\n    ],\n\n    maghrib: [\n\n        \"🌄 *Selamat menunaikan Shalat Maghrib* 🌄\\nMatahari tenggelam, berganti malam. Semoga shalat Maghrib kita menjadi pembuka pintu rahmat Allah.\",\n\n        \"🕋 *Maghrib telah tiba* 🕋\\nWaktu berbuka bagi yang berpuasa, waktu istimewa untuk berdoa.\",\n\n        \"🌅 *Keistimewaan Maghrib* 🌅\\nShalat Maghrib adalah witirnya siang.\"\n\n    ],\n\n    isya: [\n\n        \"🌙 *Selamat menunaikan Shalat Isya* 🌙\\nMalam telah tiba, semoga shalat Isya kita menjadi pelindung dari gelapnya dunia.\",\n\n        \"⭐ *Isya telah tiba* ⭐\\nAkhiri hari dengan ibadah, semoga Allah menjaga kita sepanjang malam.\",\n\n        \"🌌 *Keutamaan Shalat Isya* 🌌\\nBarangsiapa shalat Isya berjamaah, seolah ia shalat separuh malam.\"\n\n    ]\n\n};\n\n// AMBIL HADIS RANDOM\n\nfunction getRandomHadis() {\n\n    return hadisCollection[Math.floor(Math.random() * hadisCollection.length)];\n\n}\n\n// AMBIL UCAPAN RANDOM\n\nfunction getUcapan(namaSholat) {\n\n    const key = namaSholat.toLowerCase();\n\n    if (ucapanSholat[key] && ucapanSholat[key].length > 0) {\n\n        return ucapanSholat[key][Math.floor(Math.random() * ucapanSholat[key].length)];\n\n    }\n\n    return `🕌 *Selamat menunaikan Shalat ${namaSholat}* 🕌\\nSemoga ibadah kita diterima Allah SWT.`;\n\n}\n\n// FORMAT PESAN\n\nfunction formatPesanSholat(jadwal) {\n\n    const hadis = getRandomHadis();\n\n    const ucapan = getUcapan(jadwal.nama);\n\n    \n\n    const border = \"━━━━━━━━━━━━━━━━━━━━\";\n\n    \n\n    return `${border}\\n` +\n\n           `        🕋 *PENGINGAT SHOLAT* 🕋\\n` +\n\n           `${border}\\n\\n` +\n\n           `${ucapan}\\n\\n` +\n\n           `━━━━━━━━━━━━━━━━━━━━\\n` +\n\n           `📅 *Jadwal Sholat Hari Ini*\\n` +\n\n           `━━━━━━━━━━━━━━━━━━━━\\n` +\n\n           `🌅 *Subuh:*     ${jadwal.subuh}\\n` +\n\n           `☀️ *Dzuhur:*    ${jadwal.dzuhur}\\n` +\n\n           `🌆 *Ashar:*     ${jadwal.ashar}\\n` +\n\n           `🌄 *Maghrib:*   ${jadwal.maghrib}\\n` +\n\n           `🌙 *Isya:*      ${jadwal.isya}\\n` +\n\n           `━━━━━━━━━━━━━━━━━━━━\\n\\n` +\n\n           `📖 *HADIS TENTANG SHOLAT*\\n` +\n\n           `${border}\\n` +\n\n           `_\"${hadis.arab}\"_\\n\\n` +\n\n           `*Artinya:*\\n\"${hadis.arti}\"\\n\\n` +\n\n           `${hadis.sumber}\\n` +\n\n           `${border}\\n\\n` +\n\n           `🤲 *Jangan lupa tunaikan sholat tepat waktu!*\\n` +\n\n           `_Barangsiapa menjaga sholatnya, ia akan mendapat cahaya di hari kiamat._\\n\\n` +\n\n           `${border}\\n` +\n\n           `💚 *Kyro MD Bot - Pengingat Sholat* 💚`;\n\n}\n\n// UPDATE JADWAL SHOLAT (TAPI PAKAI MANUAL)\n\nasync function updateJadwalSholat() {\n\n    try {\n\n        // TETAP PAKE JADWAL MANUAL\n\n        jadwalSholat = [\n\n            { waktu: jadwalManual.subuh, nama: 'SUBUH', ...jadwalManual },\n\n            { waktu: jadwalManual.dzuhur, nama: 'DZUHUR', ...jadwalManual },\n\n            { waktu: jadwalManual.ashar, nama: 'ASHAR', ...jadwalManual },\n\n            { waktu: jadwalManual.maghrib, nama: 'MAGHRIB', ...jadwalManual },\n\n            { waktu: jadwalManual.isya, nama: 'ISYA', ...jadwalManual }\n\n        ];\n\n        \n\n        console.log('✅ Jadwal sholat manual:', jadwalManual);\n\n        return true;\n\n        \n\n    } catch (error) {\n\n        console.log('⚠️ Error update jadwal:', error.message);\n\n        return false;\n\n    }\n\n}\n\n// KIRIM PENGINGAT\n\nasync function kirimPengingatSholat(bot, chatId, waktuSholat) {\n\n    try {\n\n        const pesan = formatPesanSholat(waktuSholat);\n\n        \n\n        await bot.sendMessage(chatId, pesan, { parse_mode: 'Markdown' });\n\n        console.log(`✅ Pengingat ${waktuSholat.nama} terkirim ke ${chatId}`);\n\n        \n\n    } catch (error) {\n\n        console.log(`❌ Gagal kirim ke ${chatId}:`, error.message);\n\n    }\n\n}\n\n// CEK WAKTU\n\nasync function cekDanKirim(bot, chatId) {\n\n    try {\n\n        const now = new Date();\n\n        now.setHours(now.getHours() + 7);\n\n        const jam = now.getHours().toString().padStart(2, '0');\n\n        const menit = now.getMinutes().toString().padStart(2, '0');\n\n        const waktuSekarang = `${jam}:${menit}`;\n\n        \n\n        // console.log(`🕐 Cek waktu: ${waktuSekarang}`);\n\n        \n\n        for (const jadwal of jadwalSholat) {\n\n            if (jadwal.waktu === waktuSekarang) {\n\n                kirimPengingatSholat(bot, chatId, jadwal);\n\n                break;\n\n            }\n\n        }\n\n    } catch (error) {\n\n        console.log('❌ Error cek waktu:', error.message);\n\n    }\n\n}\n\n// UPDATE JADWAL SETIAP HARI\n\nfunction scheduleJadwalUpdate() {\n\n    cron.schedule('0 0 * * *', async () => {\n\n        console.log('🔄 Update jadwal sholat harian...');\n\n        await updateJadwalSholat();\n\n    });\n\n}\n\n// START SCHEDULER\n\nfunction startSholatScheduler(bot, chatId) {\n\n    console.log(`🕌 Scheduler sholat untuk ${chatId} dimulai`);\n\n    \n\n    // UPDATE JADWAL\n\n    updateJadwalSholat();\n\n    \n\n    // JADWALKAN UPDATE HARIAN\n\n    scheduleJadwalUpdate();\n\n    \n\n    // CEK SETIAP MENIT\n\n    cron.schedule('* * * * *', () => {\n\n        cekDanKirim(bot, chatId);\n\n    });\n\n}\n\nmodule.exports = { startSholatScheduler };",

        function saveData(){ localStorage.setItem(STORAGE_KEY, JSON.stringify(snippets)); }
        function getBugs(){ return JSON.parse(localStorage.getItem(BUGS_KEY) || "[]"); }
        function saveBugs(b){ localStorage.setItem(BUGS_KEY, JSON.stringify(b)); }
        function getContacts(){ return JSON.parse(localStorage.getItem(CONTACTS_KEY) || "[]"); }
        function saveContacts(c){ localStorage.setItem(CONTACTS_KEY, JSON.stringify(c)); }

        function escapeHtml(str){ return str.replace(/[&<>]/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;'}[m])); }
        function getLang(type){
            const map = { js:'javascript', python:'python', html:'markup', css:'css', bash:'bash' };
            return map[type] || 'javascript';
        }
        function renderSnippets(){
            const container = document.getElementById("snippetsContainer");
            if(!snippets.length){ container.innerHTML = '<div class="empty-state"><i class="fas fa-database"></i> Belum ada snippet.</div>'; return; }
            let html = "";
            snippets.forEach(s => {
                const lang = getLang(s.type);
                const safeCode = s.code.replace(/</g, '&lt;').replace(/>/g, '&gt;');
                html += `<div class="snippet-card" data-id="${s.id}">
                            <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:16px;">
                                <span style="background:linear-gradient(145deg,#2a2a4a,#1e1e3a); padding:5px 18px; border-radius:60px; font-size:0.7rem; font-weight:700;">${s.type.toUpperCase()} • ${s.filename || 'snippet'}</span>
                                <div>
                                    <button class="icon-btn copy-btn" data-code="${s.code.replace(/"/g, '&quot;')}"><i class="fas fa-copy"></i></button>
                                    ${isAdmin ? `<button class="icon-btn edit-btn" data-id="${s.id}"><i class="fas fa-edit"></i></button>
                                                <button class="icon-btn delete-btn" data-id="${s.id}"><i class="fas fa-trash-alt"></i></button>` : ''}
                                </div>
                            </div>
                            <div class="code-content line-numbers">
                                <pre class="language-${lang}"><code class="language-${lang}">${safeCode}</code></pre>
                            </div>
                        </div>`;
            });
            container.innerHTML = html;
            Prism.highlightAll();
            document.querySelectorAll('.copy-btn').forEach(btn => {
                btn.addEventListener('click', async (e) => {
                    const code = btn.getAttribute('data-code');
                    await navigator.clipboard.writeText(code);
                    alert("Kode tersalin!");
                });
            });
            if(isAdmin){
                document.querySelectorAll('.edit-btn').forEach(btn => {
                    btn.addEventListener('click', (e) => openEditModal(btn.getAttribute('data-id')));
                });
                document.querySelectorAll('.delete-btn').forEach(btn => {
                    btn.addEventListener('click', (e) => {
                        const id = btn.getAttribute('data-id');
                        if(confirm("Hapus snippet ini?")){
                            snippets = snippets.filter(s => s.id !== id);
                            saveData();
                            renderSnippets();
                            renderAdminPanels();
                        }
                    });
                });
            }
        }
        function renderAdminPanels(){
            if(!isAdmin){
                document.getElementById("adminGreetingPanel").style.display = "none";
                document.getElementById("addSnippetPanel").style.display = "none";
                document.getElementById("reportsPanel").style.display = "none";
                return;
            }
            document.getElementById("adminGreetingPanel").style.display = "block";
            document.getElementById("addSnippetPanel").style.display = "block";
            document.getElementById("reportsPanel").style.display = "block";
            document.getElementById("adminGreetingPanel").innerHTML = `
                <div class="admin-greeting">
                    <h2><i class="fas fa-crown"></i> HALO DEVELOPER KYRO</h2>
                    <div><button class="export-import" id="exportDataBtn"><i class="fas fa-download"></i> Ekspor</button>
                    <button class="export-import" id="importDataBtn"><i class="fas fa-upload"></i> Impor</button>
                    <button class="logout-icon" id="logoutAdminBtn"><i class="fas fa-sign-out-alt"></i> Logout</button></div>
                </div>`;
            document.getElementById("logoutAdminBtn")?.addEventListener("click", logout);
            document.getElementById("exportDataBtn")?.addEventListener("click", () => {
                const dataStr = JSON.stringify(snippets, null, 2);
                const blob = new Blob([dataStr], {type: "application/json"});
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = `kyro_snippets_${Date.now()}.json`;
                a.click();
                URL.revokeObjectURL(url);
            });
            document.getElementById("importDataBtn")?.addEventListener("click", () => {
                const input = document.createElement('input');
                input.type = 'file';
                input.accept = 'application/json';
                input.onchange = e => {
                    const file = e.target.files[0];
                    if(!file) return;
                    const reader = new FileReader();
                    reader.onload = ev => {
                        try{
                            const imported = JSON.parse(ev.target.result);
                            if(Array.isArray(imported)){
                                snippets = imported;
                                saveData();
                                renderSnippets();
                                alert("Impor berhasil!");
                            } else throw new Error();
                        } catch(err){ alert("File JSON tidak valid"); }
                    };
                    reader.readAsText(file);
                };
                input.click();
            });
            document.getElementById("addSnippetPanel").innerHTML = `
                <h3 style="margin-bottom:1rem;"><i class="fas fa-plus-circle"></i> Tambah Kode Baru</h3>
                <div class="form-row" style="display:flex; gap:1rem; flex-wrap:wrap;">
                    <div class="form-group" style="flex:1;"><label>Nama File</label><input type="text" id="newFilename" placeholder="contoh: script.js"></div>
                    <div class="form-group" style="flex:1;"><label>Jenis Kode</label><select id="newType"><option value="js">JS</option><option value="python">Python</option><option value="html">HTML</option><option value="css">CSS</option><option value="bash">Bash</option></select></div>
                    <div class="form-group" style="flex:2;"><label>Kode snippet</label><textarea id="newCode" rows="3" placeholder="console.log('contoh');"></textarea></div>
                </div>
                <button class="pasang-btn" id="pasangBtn"><i class="fas fa-plug"></i> PASANG</button>`;
            document.getElementById("pasangBtn")?.addEventListener("click", () => {
                const type = document.getElementById("newType").value;
                const code = document.getElementById("newCode").value.trim();
                const filename = document.getElementById("newFilename").value.trim() || "snippet."+type;
                if(!code){ alert("Kode tidak boleh kosong"); return; }
                const newId = Date.now() + "-" + Math.random().toString(36).substring(2);
                snippets.push({ id: newId, type: type, code: code, filename: filename });
                saveData();
                renderSnippets();
                document.getElementById("newCode").value = "";
                document.getElementById("newFilename").value = "";
            });
            const bugs = getBugs();
            const contacts = getContacts();
            let bugsHtml = `<h3><i class="fas fa-bug"></i> LAPORAN BUG</h3>`;
            if(bugs.length === 0) bugsHtml += `<div class="empty-state">Tidak ada laporan</div>`;
            else bugs.forEach((b, idx) => {
                bugsHtml += `<div class="report-item"><strong>${new Date(b.date).toLocaleString()}</strong><br/>${escapeHtml(b.message)}<br/><button class="delete-report" data-type="bug" data-idx="${idx}" style="margin-top:8px;">Hapus</button></div>`;
            });
            let contactsHtml = `<h3><i class="fas fa-envelope"></i> PESAN CONTACT</h3>`;
            if(contacts.length === 0) contactsHtml += `<div class="empty-state">Belum ada pesan</div>`;
            else contacts.forEach((c, idx) => {
                contactsHtml += `<div class="contact-item"><strong>${new Date(c.date).toLocaleString()}</strong><br/>${escapeHtml(c.message)}<br/><button class="delete-report" data-type="contact" data-idx="${idx}" style="margin-top:8px;">Hapus</button></div>`;
            });
            document.getElementById("reportsPanel").innerHTML = `<div style="display:flex; flex-direction:column; gap:1.8rem;">${bugsHtml}<hr/>${contactsHtml}</div>`;
            document.querySelectorAll(".delete-report").forEach(btn => {
                btn.addEventListener("click", (e) => {
                    const type = btn.getAttribute("data-type");
                    const idx = parseInt(btn.getAttribute("data-idx"));
                    if(type === "bug"){
                        let arr = getBugs();
                        arr.splice(idx,1);
                        saveBugs(arr);
                    } else {
                        let arr = getContacts();
                        arr.splice(idx,1);
                        saveContacts(arr);
                    }
                    renderAdminPanels();
                });
            });
        }
        function openEditModal(id){
            const snippet = snippets.find(s => s.id === id);
            if(!snippet) return;
            currentEditId = id;
            document.getElementById("editTypeSelect").value = snippet.type;
            document.getElementById("editCodeArea").value = snippet.code;
            document.getElementById("editModal").style.display = "flex";
        }
        function saveEdit(){
            if(!currentEditId) return;
            const newType = document.getElementById("editTypeSelect").value;
            const newCode = document.getElementById("editCodeArea").value.trim();
            if(!newCode){ alert("Kode tidak boleh kosong"); return; }
            const idx = snippets.findIndex(s => s.id === currentEditId);
            if(idx !== -1){
                snippets[idx].type = newType;
                snippets[idx].code = newCode;
                saveData();
                renderSnippets();
            }
            document.getElementById("editModal").style.display = "none";
            currentEditId = null;
        }
        function openBugModal(){ document.getElementById("bugModal").style.display = "flex"; }
        function closeBugModal(){ document.getElementById("bugModal").style.display = "none"; }
        function submitBug(){
            const msg = document.getElementById("bugDesc").value.trim();
            if(!msg){ alert("Tulis laporan bug."); return; }
            const bugs = getBugs();
            bugs.push({ date: new Date().toISOString(), message: msg });
            saveBugs(bugs);
            alert("Laporan terkirim.");
            document.getElementById("bugDesc").value = "";
            closeBugModal();
        }
        function openContactModal(){ document.getElementById("contactModal").style.display = "flex"; }
        function closeContactModal(){ document.getElementById("contactModal").style.display = "none"; }
        function sendContactMsg(){
            const msg = document.getElementById("contactMsg").value.trim();
            if(!msg){ alert("Tulis pesan."); return; }
            const contacts = getContacts();
            contacts.push({ date: new Date().toISOString(), message: msg });
            saveContacts(contacts);
            alert("Pesan terkirim.");
            document.getElementById("contactMsg").value = "";
            closeContactModal();
        }
        function openLoginModal(){ document.getElementById("loginModal").style.display = "flex"; }
        function closeLoginModal(){ document.getElementById("loginModal").style.display = "none"; }
        function onLogin(){
            const user = document.getElementById("loginUser").value;
            const pass = document.getElementById("loginPass").value;
            if(user === ADMIN_USER && pass === ADMIN_PASS){
                isAdmin = true;
                sessionStorage.setItem("kyro_admin_fix", "true");
                renderAdminPanels();
                renderSnippets();
                updateDropdownMenu();
                closeLoginModal();
            } else alert("Username atau password salah!");
        }
        function logout(){
            isAdmin = false;
            sessionStorage.removeItem("kyro_admin_fix");
            renderAdminPanels();
            renderSnippets();
            updateDropdownMenu();
        }
        function updateDropdownMenu(){
            const menu = document.getElementById("dropdownMenu");
            let items = [];
            if(!isAdmin){
                items = [
                    { icon: "fas fa-bug", label: "Lapor Bug", action: "bug" },
                    { icon: "fas fa-headset", label: "Contact Admin", action: "contact" },
                    { icon: "fas fa-user-shield", label: "Login Admin", action: "login" }
                ];
            } else {
                items = [
                    { icon: "fas fa-bug", label: "Lapor Bug", action: "bug" },
                    { icon: "fas fa-headset", label: "Contact Admin", action: "contact" },
                    { icon: "fas fa-sign-out-alt", label: "Logout Admin", action: "logout" }
                ];
            }
            menu.innerHTML = items.map(i => `<button class="dropdown-item" data-action="${i.action}"><i class="${i.icon}"></i> ${i.label}</button>`).join("");
            document.querySelectorAll('.dropdown-item').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    const act = btn.getAttribute("data-action");
                    if(act === "bug") openBugModal();
                    else if(act === "contact") openContactModal();
                    else if(act === "login") openLoginModal();
                    else if(act === "logout") logout();
                    document.getElementById("dropdownMenu").classList.remove("show");
                });
            });
        }
        function init(){
            loadData();
            const sess = sessionStorage.getItem("kyro_admin_fix");
            if(sess === "true") isAdmin = true;
            renderSnippets();
            renderAdminPanels();
            updateDropdownMenu();
            const dots = document.getElementById("dotsMenuBtn");
            const dd = document.getElementById("dropdownMenu");
            dots.addEventListener("click", (e) => { e.stopPropagation(); dd.classList.toggle("show"); });
            document.addEventListener("click", (e) => { if(!dots.contains(e.target) && !dd.contains(e.target)) dd.classList.remove("show"); });
            document.getElementById("closeBugModal")?.addEventListener("click", closeBugModal);
            document.getElementById("submitBug")?.addEventListener("click", submitBug);
            document.getElementById("closeContactModal")?.addEventListener("click", closeContactModal);
            document.getElementById("sendContactMsgBtn")?.addEventListener("click", sendContactMsg);
            document.getElementById("closeLoginModal")?.addEventListener("click", closeLoginModal);
            document.getElementById("doLogin")?.addEventListener("click", onLogin);
            document.getElementById("closeEditModal")?.addEventListener("click", () => { document.getElementById("editModal").style.display = "none"; });
            document.getElementById("saveEditSnippet")?.addEventListener("click", saveEdit);
            window.onclick = (e) => { if(e.target.classList && e.target.classList.contains("modal")) e.target.style.display = "none"; };
        }
        init();
    })();
</script>
</body>
</html>
